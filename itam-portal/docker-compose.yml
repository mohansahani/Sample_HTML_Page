version: '3.9'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  backend:
    build: ./backend
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/itam_portal
      - JWT_SECRET=changeme
      - ADMIN_NAME=Admin
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin123
      - CORS_ORIGIN=http://localhost:5173,http://frontend
    depends_on:
      - mongo
    ports:
      - "5000:5000"
  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    ports:
      - "5173:80"
volumes:
  mongo-data: